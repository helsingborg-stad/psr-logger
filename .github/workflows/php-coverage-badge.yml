name: Coverage Badge

on:
  workflow_run:
    workflows: ["Unit Tests"]
    branches: [ "main", "chore/coverage-badge" ]
    types: [completed]

jobs:
  coverage:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Guard against fork-triggered runs
      if: ${{ github.event.workflow_run.head_repository.fork == true }}
      run: |
        echo "Triggered by a fork — aborting to prevent write access from untrusted code."
        exit 1

    - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
      with:
        ref: ${{ github.event.workflow_run.head_sha }}

    - name: Setup PHP with xdebug
      uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
      with:
        php-version: '8.3'
        tools: composer:v2
        coverage: xdebug

    - name: Get Composer Cache Directory
      id: composer-cache
      run: |
        echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
    - uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3.3.3
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-

    - name: Remove installer paths
      run: composer config --unset extra.installer-paths

    - name: Install dependencies
      run: composer install --prefer-dist

    - name: Run tests with coverage
      run: composer test:coverage

    - name: Generate coverage badge
      uses: timkrase/phpunit-coverage-badge@b2cec23f5564ebf1030a6aa5b1e0fcadc5674d79 # v1.2.1
      with:
        coverage_badge_path: coverage-badge.svg
        push_badge: false
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        report: coverage/clover.xml

    - name: Extract test counts
      id: test-counts
      run: |
        python3 - <<'EOF'
        import xml.etree.ElementTree as ET, os
        tree = ET.parse('phpunit-log.xml')
        root = tree.getroot()
        suite = root.find('testsuite')
        tests    = int(suite.get('tests',    0))
        failures = int(suite.get('failures', 0))
        errors   = int(suite.get('errors',   0))
        skipped  = int(suite.get('skipped',  0))
        passed   = tests - failures - errors - skipped
        color    = 'red' if (failures + errors) > 0 else 'brightgreen'
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'passed={passed}\n')
            f.write(f'color={color}\n')
        EOF

    - name: Generate test count badge
      run: |
        curl -fsSL \
          "https://img.shields.io/badge/tests-${{ steps.test-counts.outputs.passed }}%20passed-${{ steps.test-counts.outputs.color }}.svg" \
          -o test-badge.svg

    - name: Commit and push badges
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add coverage-badge.svg test-badge.svg
        git diff --staged --quiet || git commit -m "Update badges [skip ci]"
        git push
